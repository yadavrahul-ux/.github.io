<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pro Task Dashboard</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
transition:0.3s ease;
}

body{
display:flex;
height:100vh;
background:linear-gradient(135deg,#667eea,#764ba2);
color:#333;
}

/* SIDEBAR */
.sidebar{
width:240px;
background:rgba(255,255,255,0.15);
backdrop-filter:blur(15px);
padding:20px;
color:white;
}

.sidebar h2{
margin-bottom:20px;
}

.sidebar ul{
list-style:none;
}

.sidebar li{
margin:15px 0;
cursor:pointer;
font-size:18px;
}

/* MAIN */
.main{
flex:1;
padding:25px;
overflow-y:auto;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.dark-btn{
padding:8px 15px;
border:none;
background:#111827;
color:white;
border-radius:8px;
cursor:pointer;
}

/* CARD STATS */
.cards{
display:flex;
gap:15px;
margin-bottom:20px;
}

.card{
flex:1;
padding:20px;
border-radius:15px;
background:rgba(255,255,255,0.25);
backdrop-filter:blur(15px);
color:white;
}

/* TASK BOX */
.task-box{
padding:20px;
border-radius:15px;
background:rgba(255,255,255,0.25);
backdrop-filter:blur(15px);
}

.input-row{
display:flex;
gap:10px;
margin-bottom:15px;
flex-wrap:wrap;
}

input,select{
padding:8px;
border:none;
border-radius:8px;
outline:none;
}

button.add-btn{
background:#10b981;
color:white;
border:none;
padding:8px 15px;
border-radius:8px;
cursor:pointer;
}

ul{
list-style:none;
}

li{
padding:10px;
margin-top:8px;
border-radius:10px;
background:rgba(255,255,255,0.3);
display:flex;
justify-content:space-between;
align-items:center;
color:white;
}

.completed{
text-decoration:line-through;
opacity:0.6;
}

/* PRIORITY COLORS */
.high{border-left:5px solid #ef4444;}
.medium{border-left:5px solid #f59e0b;}
.low{border-left:5px solid #22c55e;}

/* PROGRESS BAR */
.progress{
height:10px;
background:rgba(255,255,255,0.3);
border-radius:10px;
margin-top:15px;
}

.progress-bar{
height:100%;
width:0%;
background:#22c55e;
border-radius:10px;
}

/* DARK MODE */
.dark{
background:#0f172a !important;
}
.dark .card,
.dark .task-box{
background:#1e293b !important;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
<h2>Pro Dashboard</h2>
<ul>
<li onclick="showSection('home')">🏠 Home</li>
<li onclick="showSection('tasks')">📋 Tasks</li>
<li onclick="showSection('analytics')">📊 Analytics</li>
<li onclick="showSection('settings')">⚙ Settings</li>
</ul>
</div>

<!-- MAIN CONTENT -->
<div class="main">

<!-- HOME SECTION -->
<div id="home" class="section">
<h2>Welcome to Dashboard</h2>
<p>Select a menu from left.</p>
</div>

<!-- TASKS SECTION (Your UI is now inside here!) -->
<div id="tasks" class="section" style="display:none;">

<div class="header">
<h2>Task Manager Pro</h2>
<button class="dark-btn" onclick="toggleDark()">Dark Mode</button>
</div>

<div class="cards">
<div class="card">Total: <span id="total">0</span></div>
<div class="card">Completed: <span id="completed">0</span></div>
<div class="card">Pending: <span id="pending">0</span></div>
</div>

<div class="task-box">

<div class="input-row">
<input id="taskInput" placeholder="Task name">
<input type="date" id="dueDate">
<select id="priority">
<option value="low">Low</option>
<option value="medium">Medium</option>
<option value="high">High</option>
</select>
<button class="add-btn" onclick="addTask()">Add</button>
</div>

<input type="text" id="search" placeholder="Search task..." onkeyup="filterTasks()">

<ul id="taskList"></ul>

<div class="progress">
<div class="progress-bar" id="progressBar"></div>
</div>

</div>
</div>

<!-- ANALYTICS SECTION -->
<div id="analytics" class="section" style="display:none;">
<h2>Analytics Section</h2>
<p>Charts will appear here.</p>
</div>

<!-- SETTINGS SECTION -->
<div id="settings" class="section" style="display:none;">
<h2>Settings Section</h2>
<p>Settings options will appear here.</p>
</div>

</div> <!-- end main -->

<script>

// SECTION SWITCHER
function showSection(id){
document.querySelectorAll(".section").forEach(sec=>sec.style.display="none");
document.getElementById(id).style.display="block";
}

// TASK LOGIC
let taskList=document.getElementById("taskList");

window.onload=function(){
let saved=JSON.parse(localStorage.getItem("tasks"))||[];
saved.forEach(t=>addTaskToUI(t));
updateStats();
};

function addTask(){
let text=document.getElementById("taskInput").value.trim();
let date=document.getElementById("dueDate").value;
let priority=document.getElementById("priority").value;

if(!text)return;

let task={text,date,priority,completed:false};
addTaskToUI(task);
saveTasks();
updateStats();

document.getElementById("taskInput").value="";
}

function addTaskToUI(task){
let li=document.createElement("li");
li.classList.add(task.priority);
if(task.completed)li.classList.add("completed");

li.innerHTML=`
<div onclick="toggleTask(this)">
<strong>${task.text}</strong><br>
<small>${task.date || ""}</small>
</div>
<div>
<button onclick="editTask(this)">✏</button>
<button onclick="deleteTask(this)">❌</button>
</div>
`;

taskList.appendChild(li);
}

function toggleTask(el){
el.parentElement.classList.toggle("completed");
saveTasks();
updateStats();
}

function deleteTask(btn){
btn.parentElement.parentElement.remove();
saveTasks();
updateStats();
}

function editTask(btn){
let li=btn.parentElement.parentElement;
let text=prompt("Edit task:",li.querySelector("strong").innerText);
if(text){
li.querySelector("strong").innerText=text;
saveTasks();
}
}

function saveTasks(){
let tasks=[];
document.querySelectorAll("#taskList li").forEach(li=>{
tasks.push({
text:li.querySelector("strong").innerText,
date:li.querySelector("small").innerText,
priority:li.classList.contains("high")?"high":
li.classList.contains("medium")?"medium":"low",
completed:li.classList.contains("completed")
});
});
localStorage.setItem("tasks",JSON.stringify(tasks));
}

function updateStats(){
let total=document.querySelectorAll("#taskList li").length;
let completed=document.querySelectorAll("#taskList li.completed").length;
let pending=total-completed;

document.getElementById("total").innerText=total;
document.getElementById("completed").innerText=completed;
document.getElementById("pending").innerText=pending;

let percent=total===0?0:(completed/total)*100;
document.getElementById("progressBar").style.width=percent+"%";
}

function filterTasks(){
let value=document.getElementById("search").value.toLowerCase();
document.querySelectorAll("#taskList li").forEach(li=>{
li.style.display=li.innerText.toLowerCase().includes(value)?"flex":"none";
});
}

function toggleDark(){
document.body.classList.toggle("dark");
}
</script>

</body>
</html>
